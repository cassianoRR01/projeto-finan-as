<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estilos/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <title>Document</title>
</head>
<body>
    <header>
        <p><span class="material-symbols-outlined">close</span></p>
    </header>
    
    <nav>
        <div class="icones">
            <p><span class="material-symbols-outlined">person</span></p>
            <p><span class="material-symbols-outlined">calendar_month</span></p>
            <p><span class="material-symbols-outlined">notifications</span></p>
            <p><span class="material-symbols-outlined">history</span></p>
        </div>
        
        <p><span class="material-symbols-outlined" id="btnAdd">add</span></p>
    </nav>

    <div class="dinheiro">
        <p>Total mensal: R$</p>

        <p>Pago: R$</p>

        <p>Pendente: R$</p>
    </div>
    
    <div class="contas">

    </div>

    <!-- Dialog -->
    <dialog id="modalConta">
    <form id="formConta">
        <h2>Adicionar Conta</h2>

        <label>Nome da conta:</label>
        <input type="text" id="nome" required>

        <label>Data de abertura:</label>
        <input type="date" id="abertura" required>

        <label>Data de vencimento:</label>
        <input type="date" id="vencimento" required>

        <label>Valor:</label>
        <input type="number" id="valor" step="0.01" required>

        <div>
            <button type="submit">Salvar</button>
            <button type="button" id="fechar">Cancelar</button>
        </div>
    </form>
    </dialog>

    <script src="javascript/dialogAdd.js"></script>
    
</body>
</html>
