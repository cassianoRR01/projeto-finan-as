<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estilos/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <title>Document</title>
</head>
<body>
    <header>
        <span class="material-symbols-outlined" id="btnDarkMode">dark_mode</span>
    </header>
    
    <nav>
        <div class="icones">
            <p><span class="material-symbols-outlined" id="BtnLogin" class="icone">person</span></p>
            <p><span class="material-symbols-outlined" class="icone">calendar_month</span></p>
            <p><span class="material-symbols-outlined" class="icone">notifications</span></p>
            <p><span class="material-symbols-outlined" class="icone">history</span></p>
        </div>
        
        <p><span class="material-symbols-outlined icone" id="btnAdd">add</span></p>
    </nav>

    <div class="dinheiro">
        <p id="totalMen">Total mensal: R$ 0</p>

        <p id="pago">Pago: R$ 0</p>

        <p id="pendente">Pendente: R$ 0</p>
    </div>
    
    <div class="contas">

    </div>

    <!-- Dialog -->
    <dialog id="modalConta">
        <form id="formConta">
            <h2>Adicionar Conta</h2>
            
            <label>Nome da conta:</label>
            <input type="text" id="nome" required>
            
            <label>Data de abertura:</label>
            <input type="date" id="abertura" required>
            
            <label>Data de vencimento:</label>
            <input type="date" id="vencimento" required>
            
            <label>Valor:</label>
            <input type="number" id="valor" step="0.01" required>
            
            <div>
                <button type="submit">Salvar</button>
                <button type="button" id="fechar">Cancelar</button>
            </div>
        </form>
    </dialog>

    <dialog id="loginDialog">
        <form method="post">
            <label for="login">Login:</label>
            <input type="text">

            <br>

            <label for="senha">Senha:</label>
            <input type="password">

            <br>
            
            <div >
                <button type="submit">Enviar</button>
                <button id="fecharLogin">Cancelar</button>
            </div>
        </form>
    </dialog>
    

    <script src="javascript/dialogAdd.js"></script>
    <script src="javascript/login.js"></script>
    <script src="javascript/darkMode.js"></script>
</body>
</html>
