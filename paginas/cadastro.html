<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../estilos/styleHome.css">
    <link rel="shortcut icon" href="../favicon/icons8-dinheiro-16.png" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <link rel="stylesheet" href="../estilos/styleCadastro.css">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../estilos/styleSpan.css">
    <title>Cadastro</title>
</head>
<body>
    <header>

        <nav>

            <div id="logo">
                <span class="material-symbols-outlined">attach_money</span>
                <p>Con</p>
                <p id="fia">Fia</p>
            </div>

            <div id="links">
                <p><a href="index.html">Home</a></p>
                <p><a href="#">Sobre</a></p>
                <p><a href="#">Entrar</a></p>
                <p><a href="#">Cadastrar</a></p>
                <p><a href="financeiro.html">Finanças</a></p>
            </div>

            <div id="divDark">
                <span class="material-symbols-outlined" id="btnDark">dark_mode</span>
            </div>

        </nav>

    </header>

    <main class="mainCadastro">
        <div class="containerCadastro">
            <form action="" id="formCadastro">
                <h2>Cadastro</h2>
                <input type="text" id="nomeCadastro" class="campo" placeholder="Nome">
                <span class="spanForm">Insira um Nome válido</span>

                <input type="text" id="emailCadastro" class="campo" placeholder="Email">
                <span class="spanForm">Insira um Email válido</span>

                <input type="text" id="senhaCad" class="campo" placeholder="Senha">
                <span class="spanForm">Insira uma Senha válida</span>
                <input type="text" id="conSenhaCad" class="campo" placeholder="Confirmar Senha">
                <span class="spanForm">As senhas precisam ser Iguais</span>
                <input type="number" id="cpfCadastro" class="campo" placeholder="CPF">
                <span class="spanForm">Insira um CPF válido</span>

                <input type="number" id="cepCadastro" class="campo" placeholder="CEP" onblur="consultaCEP()">
                <span class="spanForm">Insira um CEP válido</span>

                <input type="text" id="ruaCadastro" class="campo" placeholder="Rua">
                <input type="text" id="bairroCadastro" class="campo" placeholder="Bairro">
                <input type="text" id="cidadeCadastro" class="campo" placeholder="Cidade">
                <input type="text" id="estadoCadastro" class="campo" placeholder="Estado">
                <input type="text" id="ufCadastro" class="campo" placeholder="UF">
                <input type="text" id="numCadastro" placeholder="Nº">
                <input type="text" id="complementoCadastro" placeholder="Complemento"> <br>
                <button type="submit">Enviar</button>
                <span class="spanCadastro" id="spanCadastro">Form Valido</span>
            </form>
        </div>


    </main>

    <script src="../javascript/cadastro.js"></script>
</body>
</html>
