<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="../estilos/styleLogin.css">
    <link rel="stylesheet" href="../estilos/styleHeader.css">
    <link rel="shortcut icon" href="../favicon/icons8-dinheiro-16.png" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
    <title>ConFia</title>
</head>
<body>
    <header>

        <nav>

            <div id="logo">
                <span class="material-symbols-outlined">attach_money</span>
                <p>Con</p>
                <p id="fia">Fia</p>
            </div>

            <div id="links">
                <p><a href="index.html">Home</a></p>
                <p><a href="sobre.html">Sobre</a></p>
                <p><a href="login.html">Entrar</a></p>
                <p><a href="cadastro.html">Cadastrar</a></p>
                <p><a href="financeiro.html">Finanças</a></p>
            </div>

            <div id="divDark">
                <span class="material-symbols-outlined" id="btnDark">dark_mode</span>
            </div>

        </nav>

    </header>

    <main>

            <div id="texto">

                <div id="titulo">
                    <p>SEJA <p class="verde">BEM VINDO(A)</p></p>
                </div>

                <p>Faça o seu login ao lado</p>

                <img src="../imagens/ilustração-login.webp" alt="máquina de cartão com moedas e notas fiscais.">

            </div>

            <form id="formLogin">

                <div class="areaInput">

                    <input type="text" class="campoLog" placeholder="e-mail" id="emailLogin" autocomplete="email">

                    <span class="spanLogin" id="spanLogin">E-mail não Encontrado</span>

                </div>

                <div class="areaInput">

                    <input type="password" class="campoLog" placeholder="senha" id="senhaLogin">

                    <span class="spanLogin" id="spanSenha">Senha incorreta</span>

                </div>
                
                <button type="submit">Entrar</button>
                
                <span class="spanLoginSucesso" id="spanLoginSucesso">Login efetuado com sucesso!</span>

                <a href="cadastro.html">
                    <p>Criar conta</p>
                </a>

            </form>

    </main>

    <script src="../javascript/login.js"></script>
</body>
</html>
